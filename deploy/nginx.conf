# -------------------------
# HTTP → HTTPS 重定向
# -------------------------
server {
    listen 80;
    server_name ai-code.net www.ai-code.net;

    return 301 https://$host$request_uri;
}

# -------------------------
# HTTPS 主站
# -------------------------
server {
    listen 443 ssl http2;
    server_name ai-code.net www.ai-code.net;

    ssl_certificate     /etc/letsencrypt/live/ai-code.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai-code.net/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 20m;

    # -------------------------
    # 前端页面
    # -------------------------
    location / {
        proxy_pass http://127.0.0.1:8081;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # -------------------------
    # 后端 API
    # -------------------------
    location /api/ {
        proxy_pass http://127.0.0.1:8080;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # -------------------------
    # 静态资源 (图片) - 直接由 Nginx 服务
    # -------------------------
    location /uploads/ {
        root /opt/aithink/data;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }
}

